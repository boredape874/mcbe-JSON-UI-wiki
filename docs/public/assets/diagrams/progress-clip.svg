<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Progress bar clipping pattern</title>
  <desc id="desc">A progress bar uses a frame, a clipping panel, and a fill image whose visible width is controlled by a binding or animation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#101827"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="fill" x1="0" x2="1"><stop offset="0" stop-color="#22c55e"/><stop offset=".55" stop-color="#eab308"/><stop offset="1" stop-color="#ef4444"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>
  <rect width="920" height="300" rx="18" fill="url(#bg)"/>
  <text x="460" y="48" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Frame + Clip + Fill</text>
  <g filter="url(#s)">
    <rect x="140" y="112" width="640" height="76" rx="14" fill="#111827" stroke="#475569" stroke-width="3"/>
    <rect x="168" y="134" width="410" height="32" rx="8" fill="url(#fill)"/>
    <rect x="168" y="134" width="584" height="32" rx="8" fill="none" stroke="#94a3b8" stroke-dasharray="8 8"/>
    <rect x="140" y="112" width="640" height="76" rx="14" fill="none" stroke="#f8fafc" stroke-opacity=".5"/>
  </g>
  <g font-family="Arial, sans-serif" fill="#cbd5e1" font-size="14">
    <text x="180" y="216">fill image</text>
    <text x="384" y="216">clip panel width = value</text>
    <text x="666" y="216">frame</text>
  </g>
  <g stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M210 204 V166"/>
    <path d="M470 204 V166"/>
    <path d="M690 204 V188"/>
  </g>
</svg>
