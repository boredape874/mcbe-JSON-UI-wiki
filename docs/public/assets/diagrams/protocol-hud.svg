<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Protocol HUD pipeline</title>
  <desc id="desc">Server sends a title, actionbar, scoreboard, or chat payload. JSON UI parses it and updates HUD widgets.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient><linearGradient id="a" x1="0" x2="1"><stop offset="0" stop-color="#22c55e"/><stop offset="1" stop-color="#38bdf8"/></linearGradient></defs>
  <rect width="920" height="300" rx="18" fill="url(#bg)"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="62" y="94" width="196" height="96" rx="14" fill="#111827" stroke="#475569"/>
    <text x="160" y="128" fill="#f8fafc" font-size="18" font-weight="700">Server</text>
    <text x="160" y="154" fill="#cbd5e1" font-size="13">title / actionbar</text>
    <text x="160" y="174" fill="#94a3b8" font-size="12">scoreboard / chat</text>
    <rect x="362" y="94" width="196" height="96" rx="14" fill="#111827" stroke="#475569"/>
    <text x="460" y="128" fill="#f8fafc" font-size="18" font-weight="700">Binding Parser</text>
    <text x="460" y="154" fill="#cbd5e1" font-size="13">tokens -> properties</text>
    <text x="460" y="174" fill="#94a3b8" font-size="12">visibility, text, bars</text>
    <rect x="662" y="94" width="196" height="96" rx="14" fill="#111827" stroke="#475569"/>
    <text x="760" y="128" fill="#f8fafc" font-size="18" font-weight="700">HUD Widgets</text>
    <text x="760" y="154" fill="#cbd5e1" font-size="13">status cluster</text>
    <text x="760" y="174" fill="#94a3b8" font-size="12">panels, bars, icons</text>
  </g>
  <g stroke="url(#a)" stroke-width="3" fill="none" stroke-linecap="round"><path d="M258 142 H362"/><path d="M558 142 H662"/></g>
  <g fill="url(#a)"><path d="M362 142 l-12 -7 v14 z"/><path d="M662 142 l-12 -7 v14 z"/></g>
</svg>
