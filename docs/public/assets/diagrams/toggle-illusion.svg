<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Animated toggle illusion</title>
  <desc id="desc">A real toggle owns state, bindings choose entry or exit factories, and animated children create the visual illusion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#172033"/></linearGradient>
    <linearGradient id="a" x1="0" x2="1"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>
  <rect width="920" height="300" rx="18" fill="url(#bg)"/>
  <g font-family="Arial, sans-serif" filter="url(#s)">
    <rect x="44" y="88" width="180" height="104" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="134" y="126" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">Real Toggle</text>
    <text x="134" y="153" fill="#cbd5e1" font-size="13" text-anchor="middle">owns #toggle_state</text>
    <rect x="86" y="166" width="96" height="18" rx="9" fill="#0f172a" stroke="#64748b"/>
    <circle cx="164" cy="175" r="13" fill="#34d399"/>
    <rect x="314" y="88" width="292" height="104" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="460" y="120" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">Binding Router</text>
    <text x="460" y="148" fill="#cbd5e1" font-size="13" text-anchor="middle">#toggle_state -> collection_length</text>
    <text x="460" y="170" fill="#94a3b8" font-size="12" text-anchor="middle">entry factory or exit factory</text>
    <rect x="696" y="72" width="180" height="72" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="786" y="103" fill="#f8fafc" font-size="17" font-weight="700" text-anchor="middle">Entry Child</text>
    <text x="786" y="126" fill="#cbd5e1" font-size="12" text-anchor="middle">plays ON animation</text>
    <rect x="696" y="164" width="180" height="72" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="786" y="195" fill="#f8fafc" font-size="17" font-weight="700" text-anchor="middle">Exit Child</text>
    <text x="786" y="218" fill="#cbd5e1" font-size="12" text-anchor="middle">plays OFF animation</text>
  </g>
  <g stroke="url(#a)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M224 140 H314"/>
    <path d="M606 128 C650 96 660 108 696 108"/>
    <path d="M606 152 C650 204 660 200 696 200"/>
  </g>
  <g fill="url(#a)">
    <path d="M314 140 l-12 -7 v14 z"/>
    <path d="M696 108 l-12 -7 v14 z"/>
    <path d="M696 200 l-12 -7 v14 z"/>
  </g>
</svg>
