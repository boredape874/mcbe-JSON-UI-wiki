<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320" role="img" aria-labelledby="title desc">
  <title id="title">2D orbit carousel illusion</title>
  <desc id="desc">A carousel can fake circular motion by changing x offset, y offset, size, alpha, and layer between discrete states.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#334155"/><stop offset="1" stop-color="#111827"/></linearGradient>
  </defs>
  <rect width="920" height="320" rx="18" fill="url(#bg)"/>
  <ellipse cx="460" cy="172" rx="306" ry="92" fill="none" stroke="#60a5fa" stroke-width="3" stroke-dasharray="10 9" opacity=".7"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="132" y="124" width="130" height="130" rx="12" fill="url(#card)" stroke="#64748b"/>
    <text x="197" y="194" fill="#cbd5e1" font-size="14">left</text>
    <text x="197" y="214" fill="#94a3b8" font-size="12">small, back</text>
    <rect x="386" y="72" width="148" height="148" rx="14" fill="#1f2937" stroke="#a78bfa" stroke-width="3"/>
    <text x="460" y="150" fill="#f8fafc" font-size="18" font-weight="700">center</text>
    <text x="460" y="174" fill="#cbd5e1" font-size="13">large, front</text>
    <rect x="658" y="124" width="130" height="130" rx="12" fill="url(#card)" stroke="#64748b"/>
    <text x="723" y="194" fill="#cbd5e1" font-size="14">right</text>
    <text x="723" y="214" fill="#94a3b8" font-size="12">small, back</text>
  </g>
  <path d="M728 110 C620 54 322 54 210 110" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
  <path d="M210 110 l14 -1 -7 12 z" fill="#34d399"/>
  <text x="460" y="282" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15" text-anchor="middle">fake orbit with offset + size + alpha + layer, not real trigonometry</text>
</svg>
