<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320" role="img" aria-labelledby="title desc">
  <title id="title">Server form contract</title>
  <desc id="desc">A server form contract connects title tokens, form type, button indexes, and field indexes between server code and JSON UI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="920" height="320" rx="18" fill="url(#bg)"/>
  <text x="460" y="42" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Server Form Contract</text>
  <g stroke="url(#line)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M230 120 H346"/>
    <path d="M574 120 H690"/>
    <path d="M460 174 V220"/>
  </g>
  <g fill="url(#line)">
    <path d="M346 120 l-12 -7 v14 z"/>
    <path d="M690 120 l-12 -7 v14 z"/>
    <path d="M460 220 l-7 -12 h14 z"/>
  </g>
  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="48" y="76" width="182" height="96" rx="12" fill="#1f2937" stroke="#475569"/>
    <text x="139" y="109" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">Server Code</text>
    <text x="139" y="136" fill="#cbd5e1" font-size="13" text-anchor="middle">opens form</text>
    <text x="139" y="156" fill="#94a3b8" font-size="12" text-anchor="middle">handles response</text>

    <rect x="346" y="76" width="228" height="96" rx="12" fill="#1f2937" stroke="#475569"/>
    <text x="460" y="105" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">Shared Contract</text>
    <text x="460" y="132" fill="#cbd5e1" font-size="13" text-anchor="middle">title token + form type</text>
    <text x="460" y="152" fill="#94a3b8" font-size="12" text-anchor="middle">button indexes + field indexes</text>

    <rect x="690" y="76" width="182" height="96" rx="12" fill="#1f2937" stroke="#475569"/>
    <text x="781" y="109" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">JSON UI</text>
    <text x="781" y="136" fill="#cbd5e1" font-size="13" text-anchor="middle">routes form</text>
    <text x="781" y="156" fill="#94a3b8" font-size="12" text-anchor="middle">renders layout</text>

    <rect x="292" y="220" width="336" height="58" rx="12" fill="#111827" stroke="#334155"/>
    <text x="460" y="245" fill="#f8fafc" font-size="15" font-weight="700" text-anchor="middle">Document this before styling</text>
    <text x="460" y="266" fill="#cbd5e1" font-size="13" text-anchor="middle">Most form bugs are contract mismatches, not artwork bugs.</text>
  </g>
</svg>
