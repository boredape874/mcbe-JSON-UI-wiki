<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">JSON UI pattern map</title>
  <desc id="desc">A map of common JSON UI pattern families: server forms, HUD protocols, containers, motion, and text logic.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="a" x1="0" x2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>
  <rect width="920" height="360" rx="18" fill="url(#bg)"/>
  <text x="460" y="44" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Pattern Families</text>
  <g stroke="url(#a)" stroke-width="3" fill="none" opacity=".8">
    <path d="M460 88 V180"/>
    <path d="M460 180 H178"/>
    <path d="M460 180 H742"/>
    <path d="M460 180 V278"/>
    <path d="M460 180 C350 154 316 130 260 104"/>
    <path d="M460 180 C570 154 604 130 660 104"/>
  </g>
  <g font-family="Arial, sans-serif" filter="url(#s)">
    <rect x="340" y="80" width="240" height="72" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="460" y="112" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">JSON UI Patterns</text>
    <text x="460" y="136" fill="#cbd5e1" font-size="12" text-anchor="middle">state + layout + binding + texture</text>
    <rect x="70" y="210" width="216" height="74" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="178" y="242" fill="#f8fafc" font-size="17" font-weight="700" text-anchor="middle">Server Forms</text>
    <text x="178" y="265" fill="#cbd5e1" font-size="12" text-anchor="middle">routes, buttons, shells</text>
    <rect x="352" y="246" width="216" height="74" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="460" y="278" fill="#f8fafc" font-size="17" font-weight="700" text-anchor="middle">Motion</text>
    <text x="460" y="301" fill="#cbd5e1" font-size="12" text-anchor="middle">toggles, bars, carousels</text>
    <rect x="634" y="210" width="216" height="74" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="742" y="242" fill="#f8fafc" font-size="17" font-weight="700" text-anchor="middle">HUD / Chat</text>
    <text x="742" y="265" fill="#cbd5e1" font-size="12" text-anchor="middle">protocols, scoreboards</text>
    <rect x="112" y="76" width="216" height="64" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="220" y="103" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">Containers</text>
    <text x="220" y="124" fill="#cbd5e1" font-size="12" text-anchor="middle">chest, pocket, grids</text>
    <rect x="592" y="76" width="216" height="64" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="700" y="103" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">Text Logic</text>
    <text x="700" y="124" fill="#cbd5e1" font-size="12" text-anchor="middle">payloads, slicing, filters</text>
  </g>
</svg>
