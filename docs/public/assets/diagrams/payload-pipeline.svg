<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Text payload pipeline</title>
  <desc id="desc">Server text can carry a token, sections, and values. JSON UI bindings parse the text into visible controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#172033"/></linearGradient>
    <linearGradient id="a" x1="0" x2="1"><stop offset="0" stop-color="#facc15"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>
  <rect width="920" height="300" rx="18" fill="url(#bg)"/>
  <g font-family="Arial, sans-serif" filter="url(#s)">
    <rect x="54" y="92" width="214" height="108" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="161" y="126" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">Server Text</text>
    <text x="161" y="154" fill="#cbd5e1" font-size="13" text-anchor="middle">[shop]|coins=120|page=2</text>
    <text x="161" y="176" fill="#94a3b8" font-size="12" text-anchor="middle">title / body / actionbar</text>
    <rect x="354" y="92" width="212" height="108" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="460" y="126" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">Bindings</text>
    <text x="460" y="154" fill="#cbd5e1" font-size="13" text-anchor="middle">slice, compare, format</text>
    <text x="460" y="176" fill="#94a3b8" font-size="12" text-anchor="middle">derive visible properties</text>
    <rect x="652" y="92" width="214" height="108" rx="14" fill="#1f2937" stroke="#475569"/>
    <text x="759" y="126" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">UI Controls</text>
    <text x="759" y="154" fill="#cbd5e1" font-size="13" text-anchor="middle">labels, bars, icons</text>
    <text x="759" y="176" fill="#94a3b8" font-size="12" text-anchor="middle">only display parsed state</text>
  </g>
  <g stroke="url(#a)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M268 146 H354"/>
    <path d="M566 146 H652"/>
  </g>
  <g fill="url(#a)">
    <path d="M354 146 l-12 -7 v14 z"/>
    <path d="M652 146 l-12 -7 v14 z"/>
  </g>
</svg>
