<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320" role="img" aria-labelledby="title desc">
  <title id="title">Visual shell layers</title>
  <desc id="desc">A polished UI shell separates background, frame, header, content region, buttons, and overlays.</desc>
  <rect width="920" height="320" rx="18" fill="#0f172a"/>
  <g font-family="Arial, sans-serif">
    <rect x="132" y="54" width="656" height="226" rx="18" fill="#111827" stroke="#334155" stroke-width="3"/>
    <rect x="158" y="78" width="604" height="42" rx="10" fill="#1f2937" stroke="#475569"/>
    <rect x="158" y="136" width="420" height="112" rx="10" fill="#0b1220" stroke="#334155"/>
    <rect x="598" y="136" width="164" height="112" rx="10" fill="#172033" stroke="#334155"/>
    <rect x="598" y="254" width="76" height="30" rx="7" fill="#334155"/>
    <rect x="686" y="254" width="76" height="30" rx="7" fill="#334155"/>
    <text x="460" y="105" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">header / title / search</text>
    <text x="368" y="196" fill="#cbd5e1" font-size="16" text-anchor="middle">content area</text>
