<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300">
  <style>
    text{font-family:Arial,sans-serif;font-size:18px;fill:#111}
    .box{fill:#f6f8fa;stroke:#222;stroke-width:2;rx:8}
    .data{fill:#fff2cc}.ui{fill:#dff6e4}.expr{fill:#e2efff}
    .arrow{stroke:#222;stroke-width:3;marker-end:url(#m)}
    .small{font-size:14px;fill:#444}
  </style>
  <defs><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#222"/></marker></defs>
  <rect class="box data" x="36" y="90" width="220" height="90"/>
  <text x="146" y="126" text-anchor="middle">Game / Form Data</text>
  <text class="small" x="146" y="152" text-anchor="middle">#title_text, #form_text</text>
  <line class="arrow" x1="256" y1="135" x2="346" y2="135"/>
  <rect class="box expr" x="346" y="90" width="220" height="90"/>
  <text x="456" y="126" text-anchor="middle">Binding Expression</text>
  <text class="small" x="456" y="152" text-anchor="middle">copy, compare, transform</text>
  <line class="arrow" x1="566" y1="135" x2="656" y2="135"/>
  <rect class="box ui" x="656" y="90" width="220" height="90"/>
  <text x="766" y="126" text-anchor="middle">Control Property</text>
  <text class="small" x="766" y="152" text-anchor="middle">#visible, #text, #texture</text>
</svg>
