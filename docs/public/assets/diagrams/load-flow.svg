  </style>
  <defs><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#222"/></marker></defs>
  <rect class="box green" x="30" y="70" width="190" height="96"/>
  <text x="125" y="108" text-anchor="middle">Resource Pack</text>
